langchain4j.azure-openai.api-key=YOUR_AZURE_KEY
langchain4j.azure-openai.endpoint=YOUR_AZURE_ENDPOINT
langchain4j.azure-openai.deployment-name=gpt-4o

# CORS - required so the React UI (served from a different origin, or opened
# as a local file) can call this API from the browser.
# CORS is handled manually via com.exam.agenticsdlc.filter.ManualCorsFilter instead of
# the quarkus-http CORS extension, after repeated trouble getting the extension's config
# to take effect reliably in this environment.
quarkus.http.cors=false